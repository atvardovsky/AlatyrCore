schema_version: "{ALATYR_ADAPTER_SCHEMA_VERSION}"
framework:
  name: "Alatyr Core"
  version: "{ALATYR_CORE_VERSION}"
  source: "{ALATYR_CORE_SOURCE}"
  template_version: "{ALATYR_TEMPLATE_VERSION}"
  rule_registry: ".ai/framework/rule-registry.json"
installation:
  id: "{INSTALLATION_ID}"
  date: "{INSTALLATION_DATE}"
  mode: "{NEW_INSTALL_OR_UPGRADE}"
owner:
  responsible_team: "{RESPONSIBLE_TEAM}"
  technical_owner: "{TECHNICAL_OWNER}"
  backup_owner: "{BACKUP_OWNER}"
  last_review_date: "{LAST_REVIEW_DATE}"
  review_cadence: "{TARGET_ADAPTER_REVIEW_CADENCE}"
  codeowners: "{CODEOWNERS_OR_EQUIVALENT_OWNER_MAP}"
  review_triggers:
    - "{REVIEW_TRIGGER}"
supported_assistants:
  - "{SUPPORTED_ASSISTANT}"
contours:
  framework: ".ai/framework"
  project: ".ai/project"
  assistant: ".ai/assistant"
source_of_truth:
  project_contour: ".ai/project/contour.md"
  registry: ".ai/project/source-of-truth-registry.md"
  consistency_map: ".ai/project/consistency-map.json"
  assistant_contour: ".ai/assistant/contour.md"
  context_router: ".ai/assistant/context-router.json"
  context_profiles: ".ai/assistant/context-profiles.md"
  module_profile: ".ai/assistant/module-profile.md"
  project_sources:
    - "{TARGET_PROJECT_SOURCE_OF_TRUTH}"
context_routing:
  router_schema_version: 2
  preloaded_context:
    - "AGENTS.md"
  compact_bootstrap:
    - ".ai/alatyr.yaml"
    - ".ai/README.md"
    - ".ai/assistant/context-router.json"
  bootstrap_max_files: 4
  bootstrap_max_words: 2000
  profile_default_max_files: 12
  profile_default_max_words: 8000
  budget_behavior: "record expansion reason and load only required owners"
modules:
  core_profile: "{COMPLETE_OR_MISSING_GAPS}"
  enabled:
    - "{ENABLED_MODULE}"
  deferred:
    - "{DEFERRED_MODULE_AND_REASON}"
  blocked:
    - "{BLOCKED_MODULE_AND_MISSING_FACT}"
validation:
  commands:
    - name: "{VALIDATION_NAME}"
      command: "{TARGET_VALIDATION_COMMAND_OR_MANUAL_REVIEW}"
      required_for:
        - "{TASK_PROFILE}"
ai_infrastructure:
  router: ".ai/assistant/ai-infrastructure-router.json"
  inventory: ".ai/assistant/templates/ai-infrastructure-inventory.md"
  adaptation_record: ".ai/assistant/templates/ai-infrastructure-adaptation-record.md"
operations:
  help: ".ai/assistant/help.md"
  help_reference: ".ai/assistant/help-reference.md"
  operation_request: ".ai/assistant/templates/operation-request.md"
  installation_note: ".ai/assistant/templates/installation-note.md"
  output_contracts: ".ai/assistant/templates/adapter-output-contracts.md"
  large_task_packet: ".ai/assistant/templates/large-task-operation-packet.md"
  ai_infrastructure_inventory: ".ai/assistant/templates/ai-infrastructure-inventory.md"
  migration_note: ".ai/assistant/templates/migration-note.md"
  effectiveness_report: ".ai/assistant/templates/effectiveness-report.md"
maturity:
  profile: ".ai/assistant/maturity-profile.md"
bridges:
  capability_matrix: ".ai/assistant/bridge-capability-matrix.md"
approvals:
  directory: ".ai/assistant/approvals"
  template: ".ai/assistant/approvals/approval-template.md"
  machine_template: ".ai/assistant/approvals/approval-record-template.json"
policies:
  source_access: ".ai/assistant/policies/ai-infrastructure-source-access.md"
  prompt_injection: ".ai/assistant/policies/prompt-injection.md"
known_gaps:
  - "{KNOWN_GAP}"
local_deviations:
  - "{LOCAL_DEVIATION}"
